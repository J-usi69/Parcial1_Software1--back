server:
  port: 8080

spring:
  application:
    name: workflow-departamental
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 30MB
  data:
    mongodb:
      uri: mongodb://localhost:27017/workflow_db
      auto-index-creation: true
  
  ai:
    vertex:
      ai:
        gemini:
          project-id: project-da37a9fc-9c9e-4d37-822 # Reemplaza con tu Project ID de Google Cloud
          location: us-central1          # Reemplaza con tu región (ej. us-central1)
          chat:
            options:
              model: gemini-1.5-flash-001
              temperature: 0.1

# Logging
logging:
  level:
    root: INFO
    com.workflow: DEBUG
    org.springframework.data.mongodb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Custom application properties
app:
  uploads:
    dir: ./uploads
  cors:
    allowed-origins: http://localhost:4200
  workflow:
    tracking-prefix: "WF"
    presencia:
      online-window-seconds: 120
      cleanup-fixed-delay-ms: 60000
      cleanup-initial-delay-ms: 15000
    sla:
      monitor:
        enabled: true
        fixed-delay-ms: 300000
        initial-delay-ms: 20000
